<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ultra Atlas Muscular</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#020617">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header class="topo">
  <div>
    <h1>Ultra Atlas Muscular</h1>
    <p>Prof. Cláudia Pinheiro</p>
  </div>

  <div class="acoes-topo">
    <button onclick="toggleVoice()">🎤 Voz</button>
    <button onclick="gerarPDF()">📄 PDF</button>
    <button id="btnInstall">📲 Instalar</button>
  </div>
</header>

<main class="layout">

<aside class="menu">
<h2>Slides</h2>

<div class="grade" id="grade"></div>

<div class="painel">
<h3>Comandos de voz</h3>

<ul>
<li>"Próximo"</li>
<li>"Anterior"</li>
<li>"Zoom mais"</li>
<li>"Zoom menos"</li>
<li>"Abrir slide 12"</li>
<li>"Modo escuro"</li>
</ul>
</div>

</aside>

<section class="conteudo">

<div class="viewer">

<div class="barra-slide">
<h2 id="tituloSlide">Slide 1</h2>

<div class="controles">
<button onclick="anterior()">◀</button>
<button onclick="proximo()">▶</button>
<button onclick="zoomMais()">＋</button>
<button onclick="zoomMenos()">－</button>
<button onclick="fullscreen()">⛶</button>
</div>
</div>

<div class="imagem-box" id="imagemBox">

<img src="imagens/1.png" id="slideImg">

</div>

</div>

<div class="cards">

<div class="card">
<h3>💡 Curiosidades</h3>
<ul id="curiosidades"></ul>
</div>

<div class="card">
<h3>🩺 Casos Clínicos</h3>
<div id="casos"></div>
</div>

<div class="card">
<h3>📝 Anotações</h3>

<textarea id="notas"></textarea>

<button onclick="salvarNotas()">Salvar</button>
</div>

</div>

</section>

</main>

<script src="dados.js"></script>
<script src="app.js"></script>

</body>
</html>
